version: '3.8'
services:
  dev-db:
    image: postgres:13
    container_name: mre-postgres-dev
    environment:
      POSTGRES_USER: mre_user
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: mre_electricity_crm
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    

  redis:
    image: redis:alpine
    container_name: mre-redis
    ports:
      - "6379:6379" 
    volumes:
      - redis-data:/data


  test-db:
    image: postgres:13
    container_name: mre-postgres-test
    environment:
      POSTGRES_USER: mre_test_user
      POSTGRES_PASSWORD: mre_test_password
      POSTGRES_DB: mre_electricity_crm_test
    ports:
      - "5435:5432"
    volumes:
    - pg-test-data:/var/lib/postgresql/data

volumes:
  pg-test-data:
  postgres-data:
  redis-data:
